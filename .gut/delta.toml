# This template merge config file should be stored in
# .gut/ of each consumer repo. It contains:
# - template: url of template repo
# - rev_id: automatically maintained
# - template_sha: sha of last known version merged with this repo
# - replacements: list of string replacements: placeholder -> real string
template = "https://github.com/giellalt/template-speech-und"
rev_id = 1
template_sha = "0000000000000000000000000000000000000000"

[replacements]
__UND__ = "__UND__"
__UNDEFINED__ = "__UNDEFINED__"
